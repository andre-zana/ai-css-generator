<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Generator com IA</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>CSS Generator <span>com IA</span></h1>

    <textarea
      id="entrada"
      rows="3"
      class="caixa-texto"
      placeholder="Como posso ajudar você hoje?"
    ></textarea>

    <button class="botao-gerar">Gerar Código</button>

    <div class="resultado">
      <div>
        <h2>Código</h2>
        <p class="bloco-codigo"></p>
      </div>

      <div>
        <h2>Preview</h2>
        <iframe class="resultado-codigo"></iframe>
      </div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
